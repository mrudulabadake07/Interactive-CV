<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive CV</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <button id="editBtn">Edit</button>
        <button id="saveBtn">Save</button>
        <button id="viewBtn">View</button>
        <button id="pdfBtn">Download as PDF</button>
        <button id="wordBtn">Download as Word</button>
    </header>
    <main>
        <section id="section-personal">Personal Info...</section>
        <section id="section-education">Education...</section>
        <section id="section-projects">Projects...</section>
        <section id="section-skills">Skills...</section>
        <section id="section-experience">Experience...</section>
    </main>
    <footer>
        <p id="lastUpdated">Last Updated...</p>
        <div id="update-block">
            <h3>Update History</h3>
            <ul></ul>
        </div>
    </footer>
    <script src="index.js"></script>
</body>
</html>
